version: 2

models:
  - name: mart_customer_360
    description: "Camada de apresentação para BI com KPIs de Recência, Churn e Saúde do Cliente."
    columns:
      - name: sk_customer
        data_tests: [unique, not_null]
      - name: nk_customer_id
        data_tests: [not_null]
      - name: ctm_company_name
      - name: first_order_date
      - name: last_order_date
      - name: recency_days
        description: "Dias desde a última compra (calculado contra a current_business_date)."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: customer_tenure_days
        description: "Tempo de vida do cliente em dias (Last - First Order)."
      - name: total_orders
      - name: total_revenue
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: customer_lifetime_value
        description: "Soma total de receita gerada pelo cliente."
      - name: rfm_code
        data_tests:
          - not_null
      - name: is_churned
        description: "Flag TRUE se o cliente não compra há mais de 90 dias."
      - name: customer_health_score
        description: "Score de 0.05 a 0.95 baseado no segmento RFM."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0.05, max_value: 0.95 }
      - name: revenue_at_risk
        description: "Valor do Ticket Médio multiplicado pela probabilidade de churn do cliente."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0

  - name: mart_product_360
    description: "Camada de apresentação para BI com KPIs de Estoque, Giro e Ciclo de Vida do Produto."
    columns:
      - name: sk_product
        data_tests: [unique, not_null]
      - name: nk_product_id
      - name: prd_product_name
      - name: cat_category_name
      - name: current_catalog_price
      - name: prd_units_in_stock
      - name: days_since_last_sale
      - name: days_of_inventory
        description: "Projeção de quanto tempo o estoque dura baseado na média de vendas dos últimos 30 dias."
      - name: is_stockout_risk
        description: "Flag TRUE se o estoque durar menos de 7 dias."
      - name: product_lifecycle_stage
        description: "Classificação baseada no crescimento de receita (GROWTH, MATURITY, DECLINE, etc)."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments:
                value_set:
                  [
                    "NO_RECENT_SALES",
                    "INTRODUCTION",
                    "GROWTH",
                    "DECLINE",
                    "MATURITY",
                  ]
      - name: view_calculated_at
        data_tests: [not_null]

  - name: mart_market_basket
    description: "Análise de cesta de compras (Quais produtos são comprados juntos)."
    columns:
      - name: sk_product_a
        description: "Chave surrogate do Produto Principal."
        data_tests:
          - not_null
      - name: sk_product_b
        description: "Chave surrogate do Produto Comprado Junto."
        data_tests:
          - not_null
      - name: times_bought_together
        description: "Quantas vezes os dois produtos saíram no mesmo pedido."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: recommendation_rank
        description: "Ranking de recomendação 1, 2, 3... para o produto A."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1

  - name: mart_cohort_retention
    description: "Análise de retenção de clientes por safra (mês da primeira compra)."
    columns:
      - name: cohort_month
        description: "Mês em que o cliente fez o primeiro pedido."
        data_tests:
          - not_null
      - name: cohort_index
        description: "Meses decorridos desde a primeira compra (0 = Mês de entrada)."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: initial_customers
        description: "Tamanho original da safra no Mês 0."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: retention_rate
        description: "Porcentagem de clientes da safra original que compraram neste mês."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0.0
                max_value: 1.0
