version: 2

models:
  - name: pre_fct_orders
    description: "Cabeçalho de pedidos de venda. Contém datas, transportadora e custos logísticos."
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ord_order_date <= ord_required_date"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "ord_order_date <= ord_shipped_date OR ord_shipped_date = cast({{ var('date_default') }} as date)"
    columns:
      - name: ord_order_id
        description: "Código do pedido (Chave Primária)."
        data_tests:
          - unique
          - not_null
      - name: ctm_customer_id
        description: "Chave Estrangeira para a dimensão de Clientes."
        data_tests:
          - not_null
          - dbt_utils.not_empty_string:
              arguments:
                trim_whitespace: true
          - relationships:
              arguments:
                to: ref('pre_dim_customers')
                field: ctm_customer_id
      - name: emp_employee_id
        description: "Chave Estrangeira para a dimensão de Funcionários."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('pre_dim_employees')
                field: emp_employee_id
      - name: shp_shipper_id
        description: "Chave Estrangeira para Transportadoras."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('pre_dim_shippers')
                field: shp_shipper_id
      - name: ord_order_date
        description: "Data de realização do pedido."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "cast('1990-01-01' as date)"
                max_value: "cast('2030-12-31' as date)"
      - name: ord_required_date
        description: "Data prevista para entrega."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "cast('1990-01-01' as date)"
                max_value: "cast('2030-12-31' as date)"
      - name: ord_shipped_date
        description: "Data real de envio da mercadoria."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "cast({{ var('date_default') }} as date)"
                max_value: "cast('2030-12-31' as date)"
      - name: ord_freight
        description: "Valor cobrado pelo frete."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: ord_ship_name
        description: "Nome do destinatário no local de entrega."
        data_tests:
          - not_null
          - dbt_utils.not_empty_string:
              arguments:
                trim_whitespace: true
      - name: ord_ship_address
        description: "Endereço de entrega."
        data_tests:
          - not_null
          - dbt_utils.not_empty_string:
              arguments:
                trim_whitespace: true
      - name: ord_ship_city
        description: "Cidade de entrega."
        data_tests:
          - not_null
          - dbt_utils.not_empty_string:
              arguments:
                trim_whitespace: true
      - name: ord_ship_region
        description: "Estado ou região de entrega."
        data_tests:
          - not_null
          - dbt_utils.not_empty_string:
              arguments:
                trim_whitespace: true
      - name: ord_ship_postal_code
        description: "Código postal de entrega."
        data_tests:
          - not_null
          - dbt_utils.not_empty_string:
              arguments:
                trim_whitespace: true
      - name: ord_ship_country
        description: "País de entrega."
        data_tests:
          - not_null
          - dbt_utils.not_empty_string:
              arguments:
                trim_whitespace: true
      - name: ord_insert_date
        description: "Data/Hora de atualização na camada Silver."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "cast('1990-01-01' as timestamp)"
                max_value: "cast('2030-12-31' as timestamp)"

  - name: pre_fct_order_details
    description: "Itens de linha dos pedidos. Regista produtos, preços unitários e descontos."
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [ord_order_id, prd_product_id]
    columns:
      - name: ord_order_id
        description: "Chave Estrangeira para o Pedido."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('pre_fct_orders')
                field: ord_order_id
      - name: prd_product_id
        description: "Chave Estrangeira para o Produto."
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('pre_dim_products')
                field: prd_product_id
      - name: odt_unit_price
        description: "Preço unitário cobrado no momento da venda."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
      - name: odt_quantity
        description: "Quantidade de itens comprados."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 1
      - name: odt_discount
        description: "Desconto aplicado sobre o preço base."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: 0
                max_value: 1
      - name: odt_insert_date
        description: "Data/Hora de atualização na camada Silver."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "cast('1990-01-01' as timestamp)"
                max_value: "cast('2030-12-31' as timestamp)"

