              arguments:
                min_value: 0
      - name: prd_is_discontinued
        description: "Flag a indicar se o produto foi descontinuado."
        data_tests:
          - not_null
      - name: prd_insert_date
        description: "Data/Hora de atualização."
        data_tests:
