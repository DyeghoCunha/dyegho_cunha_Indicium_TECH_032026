version: 2

models:
  - name: int_customer_rfm_scores
    description: "Customer RFM scores calculated from order history. Base table for customer segmentation."
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique
      - name: recency_days
        description: "Days since last purchase (lower is better)"
        tests:
          - not_null
      - name: frequency
        description: "Total number of orders placed"
        tests:
          - not_null
      - name: monetary
        description: "Total revenue generated by customer"
        tests:
          - not_null
      - name: r_score
        description: "Recency quintile score (1-5, 5 is best)"
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: f_score
        description: "Frequency quintile score (1-5, 5 is best)"
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: m_score
        description: "Monetary quintile score (1-5, 5 is best)"
        tests:
          - not_null
          - accepted_values:
              values: [1, 2, 3, 4, 5]
      - name: rfm_code
        description: "Concatenated RFM score (e.g., '555' for best customers)"
        tests:
          - not_null

  - name: int_customer_segments
    description: "Customer segments derived from RFM analysis with business-friendly labels."
    columns:
      - name: customer_id
        description: "Unique customer identifier"
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('pre_dim_customers')
              field: ctm_customer_id
      - name: customer_segment
        description: "Business segment label (e.g., CHAMPIONS, AT_RISK, LOST)"
        tests:
          - not_null
          - accepted_values:
              values: 
                - 'CHAMPIONS'
                - 'LOYAL_CUSTOMERS'
                - 'POTENTIAL_LOYALIST'
                - 'NEW_CUSTOMERS'
                - 'PROMISING'
                - 'NEED_ATTENTION'
                - 'AT_RISK'
                - 'CANNOT_LOSE_THEM'
                - 'HIBERNATING'
                - 'LOST'
                - 'BIG_SPENDERS'
                - 'STANDARD'
      - name: segment_description
        description: "Human-readable description of segment criteria"
        tests:
          - not_null