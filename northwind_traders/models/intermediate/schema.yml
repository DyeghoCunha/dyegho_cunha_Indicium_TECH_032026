version: 2

models:

  - name: int_orders_aggregated
    description: "Tabela intermediária que agrega detalhes do pedido e métricas de SLA."
    columns:
      - name: sk_order
        data_tests:
          - unique
          - not_null
      - name: sk_customer
        data_tests:
          - not_null
      - name: order_value
        description: "Valor líquido total do pedido."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: order_discount
        description: "Valor total de desconto no pedido."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: order_quantity
        description: "Quantidade total de itens no pedido."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 1 }
      - name: products_per_order
        description: "Contagem de produtos únicos no pedido."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 1 }
      - name: is_late
        description: "Flag binária: 1 se entregue após required_date, 0 caso contrário."
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              arguments: { value_set: [0, 1] }
      - name: late_by_days
        description: "Dias de atraso (0 se no prazo)."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }

  - name: int_customer_rfm_scores
    description: "Cálculo base dos decis de RFM."
    columns:
      - name: customer_id
        data_tests:
          - unique
          - not_null
      - name: recency_days
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: frequency
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 1 }
      - name: monetary
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: r_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 1, max_value: 5 }
      - name: f_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 1, max_value: 5 }
      - name: m_score
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 1, max_value: 5 }
      - name: rfm_code
        data_tests:
          - not_null
          - dbt_expectations.expect_column_value_lengths_to_equal:
              arguments: { value: 3 }

  - name: int_customer_segments
    description: "Segmentação final dos clientes."
    columns:
      - name: customer_id
        data_tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('pre_dim_customers')
                field: ctm_customer_id
      - name: customer_segment
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: 
                  - 'CHAMPIONS'
                  - 'LOYAL_CUSTOMERS'
                  - 'POTENTIAL_LOYALIST'
                  - 'NEW_CUSTOMERS'
                  - 'PROMISING'
                  - 'NEED_ATTENTION'
                  - 'AT_RISK'
                  - 'CANNOT_LOSE_THEM'
                  - 'HIBERNATING'
                  - 'LOST'
                  - 'BIG_SPENDERS'
                  - 'STANDARD'
      - name: segment_description
        data_tests:
          - not_null

  - name: int_customer_metrics
    description: "Agregações comportamentais do cliente (receita, SLAs, LTV)."
    columns:
      - name: sk_customer
        data_tests:
          - unique
          - not_null
      - name: total_orders
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: total_revenue
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: revenue_last_30d
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: revenue_last_90d
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: revenue_last_365d
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: avg_discount_pct
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0.0, max_value: 1.0 }
      - name: total_freight_paid
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: late_deliveries
        description: "Total de pedidos entregues com atraso para este cliente."
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }

  - name: int_product_metrics
    description: "Métricas de giro e velocidade de vendas dos produtos."
    columns:
      - name: sk_product
        data_tests:
          - unique
          - not_null
      - name: days_with_sales
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: total_quantity_sold
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: unique_customers
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: avg_selling_price
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: avg_discount_pct
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0.0, max_value: 1.0 }
      - name: quantity_sold_last_30d
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }
      - name: revenue_last_30d
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments: { min_value: 0 }